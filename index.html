<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css" class="rel">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Product preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="card">
    <picture>
      <source srcset="images/image-product-desktop.jpg" media="(min-width: 600px)"/>
      <img src="images/image-product-mobile.jpg" alt="Chanel perfume bottle" class="header">
    </picture>

    <div class="article">
      <p class="category gray">Perfume</p>

      <h1 class="fraunces-text">Gabrielle Essence Eau De Parfum</h1>

      <p class="product-info gray">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
      Perfumer-Creator for the House of CHANEL.</p>

      <div class="product-prices">
        <p class="fraunces-text sale-price">$149.99</p>
        <p class="montserrat-text reg-price gray reg-price">$169.99</p>
      </div>

      <div class="button">
        <button class="cartAdd">
          <p>Add to Cart</p>
        </button>
      </div>
      
    </div>
  </div>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div>
</body>
</html>
